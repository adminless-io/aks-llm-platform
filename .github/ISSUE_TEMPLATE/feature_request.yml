name: Feature request
description: Propose an enhancement (new layer capability, model, FinOps lever, etc.)
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What's missing or painful today?
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What you'd like to see. Note the layer it touches if known.
    validations: { required: true }
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
