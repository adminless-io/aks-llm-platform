---
name: e2e
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Validates GitOps + Kustomize LOGIC on a throwaway kind cluster.
# Cannot validate: GPU scheduling, Azure managed Prometheus/Grafana, APIM,
# Spot/scale-to-zero — those gate on a prod-like AKS run (see BONUS.md).
jobs:
  kind-gitops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: helm/kind-action@v1
        with:
          cluster_name: llmops-e2e
          config: test/kind-cluster.yaml
      - name: run e2e
        run: bash test/run-test.sh
