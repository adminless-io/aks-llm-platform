# Runs ONCE automatically the first time someone clicks "Use this template"
# and pushes. It scrubs template-specific placeholders, then deletes itself so
# it never runs in the generated repo again. Manual alternative: scripts/init-template.sh.
name: Template cleanup

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    # Skip on the template repo itself — only run in repos created FROM it.
    if: ${{ !github.event.repository.is_template }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rewrite placeholders to this repo's name
        run: |
          ORG="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY##*/}"
          sed -i -E "s#adminless-io/aks-llm-platform#${ORG}/${REPO}#g; s#adminless-io/aks-llm-platform#${ORG}/${REPO}#g" README.md || true

      - name: Remove template-only files
        run: |
          rm -f .github/workflows/template-cleanup.yml scripts/init-template.sh

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: initialize from template" || echo "nothing to do"
          git push
