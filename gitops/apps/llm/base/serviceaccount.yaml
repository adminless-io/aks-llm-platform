---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-serving
  namespace: llm
  annotations:
    # Client ID of the 20-identity "workload" UAMI. Patched per-overlay (the
    # value is a Terraform output: workload_identities["workload"].client_id).
    azure.workload.identity/client-id: "REPLACE_WITH_UAMI_CLIENT_ID"
  labels:
    azure.workload.identity/use: "true"
