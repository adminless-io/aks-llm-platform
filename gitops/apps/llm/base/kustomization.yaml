---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: llm
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
  - scaledobject.yaml
  - pdb.yaml
configMapGenerator:
  - name: llm-config
    literals:
      # The "top 1" open-weight model. Overlays merge to swap per environment.
      - model_id=Qwen/Qwen2.5-7B-Instruct
generatorOptions:
  # Stable name so the Deployment's configMapKeyRef stays "llm-config".
  disableNameSuffixHash: true
labels:
  - pairs:
      app.kubernetes.io/part-of: llm-platform
