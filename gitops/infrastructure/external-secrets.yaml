---
# External Secrets Operator: syncs Key Vault secrets (Content Safety / AOAI
# keys from 60) into Kubernetes Secrets, authenticating via Workload Identity
# (the "external_secret" UAMI from 20-identity). No secrets in Git or tfvars.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 30m
  chart:
    spec:
      chart: external-secrets
      version: "0.10.x"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
  values:
    installCRDs: true
    nodeSelector:
      workload: general
    serviceAccount:
      annotations:
        azure.workload.identity/client-id: "REPLACE_WITH_EXTERNAL_SECRET_UAMI_CLIENT_ID"
    podLabels:
      azure.workload.identity/use: "true"
