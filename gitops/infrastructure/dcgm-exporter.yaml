---
# NVIDIA DCGM exporter: per-GPU utilisation/memory/temp/power metrics to
# managed Prometheus. Feeds the GPUSaturated / GPUIdleButProvisioned alerts
# (50-observability) and the GPU Grafana dashboard. Runs only on GPU nodes.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dcgm-exporter
  namespace: gpu-operator
spec:
  interval: 30m
  chart:
    spec:
      chart: dcgm-exporter
      version: "3.6.x"
      sourceRef:
        kind: HelmRepository
        name: nvidia
        namespace: flux-system
  values:
    nodeSelector:
      workload: gpu
    tolerations:
      - key: sku
        operator: Equal
        value: gpu
        effect: NoSchedule
      - key: kubernetes.azure.com/scalesetpriority
        operator: Equal
        value: spot
        effect: NoSchedule
    serviceMonitor:
      enabled: true
