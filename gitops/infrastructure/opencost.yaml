---
# OpenCost: in-cluster cost allocation by namespace/label/tenant. Scrapes
# Azure rates and exposes /metrics to managed Prometheus -> Grafana cost
# dashboards + the cost/token panel.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost
  namespace: observability
spec:
  interval: 30m
  chart:
    spec:
      chart: opencost
      version: "1.43.x"
      sourceRef:
        kind: HelmRepository
        name: opencost
        namespace: flux-system
  values:
    opencost:
      prometheus:
        internal:
          enabled: false
        external:
          enabled: true
          url: "http://prometheus.observability.svc:9090"
      exporter:
        defaultClusterId: llmops-aks
      metrics:
        serviceMonitor:
          enabled: true
    nodeSelector:
      workload: general
